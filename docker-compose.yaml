version: '3.8'

services:
  web-app:
    build: .
    image: my-local-app:latest
    container_name: production-web-container
    ports:
      - "8080:5000"
    environment:
      - DB_HOST=postgres-db
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:15-alpine
    container_name: production-db-container
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"