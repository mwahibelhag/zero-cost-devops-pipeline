name: Zero-Cost DevSecOps Pipeline

on:
  push:
    branches: [ "main" ] # سيعمل خط الأنابيب تلقائياً عند الدفع لفرع main

jobs:
  devops-pipeline:
    runs-on: self-hosted # 👈 هنا نوصي بالتشغيل على الـ Runner الأخضر الخاص بجهازك

    steps:
      - name: 1. Check out repository code
        uses: actions/checkout@v4

      - name: 2. Test & Lint Code
        run: |
          echo "==== RUNNING TESTS ===="
          # هنا نتحقق محلياً من أن الكود سليم قبل البناء
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Code is valid and ready for building."

      - name: 3. Build and Deploy with Docker Compose
        run: |
          echo "==== STARTING DEPLOYMENT ===="
          # أمر سحري لإيقاف أي حاويات قديمة وتنظيف الكاش ثم بناء وتشغيل التطبيق وقاعدة البيانات معاً
          docker-compose down --remove-orphans
          docker-compose up -d --build
          echo "==== DEPLOYMENT SUCCESSFUL ===="

      - name: 4. Verify Running Services
        run: |
          echo "==== CURRENT RUNNING CONTAINERS ===="
          docker ps